<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .window-bg { fill: #1a1a2e; }
      .toolbar { fill: #16213e; }
      .panel { fill: #1e2a45; }
      .sidebar { fill: #1e2a45; }
      .detail { fill: #1e2a45; }
      .log { fill: #141c30; }
      .border { fill: none; stroke: #2a3a5e; stroke-width: 1; }
      .accent { fill: #4fc3f7; }
      .text-main { fill: #dce4f0; font-family: 'Segoe UI', sans-serif; }
      .text-dim { fill: #7a8ba8; font-family: 'Segoe UI', sans-serif; }
      .text-accent { fill: #4fc3f7; font-family: 'Segoe UI', sans-serif; font-weight: bold; }
      .text-green { fill: #4caf50; font-family: 'Segoe UI', sans-serif; }
      .text-red { fill: #f44336; font-family: 'Segoe UI', sans-serif; }
      .text-yellow { fill: #ffb300; font-family: 'Segoe UI', sans-serif; }
      .btn { fill: #2a3a5e; rx: 4; ry: 4; }
      .btn-accent { fill: #1565c0; }
      .btn-danger { fill: #b71c1c; }
      .server-item { fill: #243350; }
      .server-item-selected { fill: #1a3060; }
      .tab-active { fill: #1565c0; }
      .tab-inactive { fill: #243350; }
      .input-bg { fill: #141c30; }
      .status-green { fill: #4caf50; }
      .status-red { fill: #f44336; }
      .status-yellow { fill: #ffb300; }
      .splitter { fill: #2a3a5e; }
